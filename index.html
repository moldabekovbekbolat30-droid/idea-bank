<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Банк идей</title>
<meta name="description" content="Поделись проблемой или идеей — анонимно, без регистрации." />
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='16' fill='%23ff6b4a'/%3E%3Ctext x='32' y='44' font-size='34' text-anchor='middle' fill='%23fff' font-family='Georgia,serif'%3E💡%3C/text%3E%3C/svg%3E" />
<style>
  :root{
    --cream:#fff8f1;
    --card:#ffffff;
    --coral:#ff6b4a;
    --coral-dark:#e2542f;
    --ink:#2b2320;
    --muted:#8a7a70;
    --line:#f0e2d6;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    background:var(--cream);
    color:var(--ink);
    font-family:'Nunito','IBM Plex Sans',system-ui,-apple-system,sans-serif;
    font-size:17px;
    line-height:1.55;
    min-height:100vh;
    display:flex;
    flex-direction:column;
  }
  h1,h2{font-family:Georgia,'Nunito',serif;font-weight:700;margin:0}
  .wrap{
    max-width:640px;
    margin:0 auto;
    padding:32px 20px 24px;
    width:100%;
    flex:1;
  }
  header{
    text-align:center;
    margin-bottom:28px;
  }
  header .emoji{font-size:44px;line-height:1}
  header h1{font-size:30px;color:var(--ink);margin-top:8px}
  header p{color:var(--muted);font-size:16px;margin-top:8px}

  .card{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:20px;
    padding:26px;
    box-shadow:0 6px 24px rgba(226,84,47,.06);
  }
  label{display:block;font-weight:700;margin-bottom:8px;font-size:15px}
  .hint{color:var(--muted);font-weight:400;font-size:13px;margin-left:6px}
  textarea, input[type=text]{
    width:100%;
    border:2px solid var(--line);
    border-radius:14px;
    padding:14px 16px;
    font-family:inherit;
    font-size:16px;
    color:var(--ink);
    background:#fffefc;
    resize:vertical;
    transition:.15s border-color;
  }
  textarea{min-height:140px}
  textarea:focus, input[type=text]:focus{outline:none;border-color:var(--coral)}
  .field{margin-bottom:20px}
  .field:last-of-type{margin-bottom:24px}

  button.primary{
    width:100%;
    background:var(--coral);
    color:#fff;
    border:none;
    border-radius:14px;
    padding:16px;
    font-size:17px;
    font-weight:700;
    font-family:inherit;
    cursor:pointer;
    transition:.15s background,.1s transform;
  }
  button.primary:hover{background:var(--coral-dark)}
  button.primary:active{transform:scale(.99)}
  button.primary:disabled{opacity:.6;cursor:default}

  .thanks{
    text-align:center;
    padding:40px 20px;
  }
  .thanks .emoji{font-size:56px}
  .thanks h2{font-size:24px;margin-top:14px}
  .thanks p{color:var(--muted);margin-top:8px}
  .thanks button{
    margin-top:22px;
    background:none;
    border:2px solid var(--coral);
    color:var(--coral-dark);
    border-radius:12px;
    padding:10px 20px;
    font-weight:700;
    font-family:inherit;
    cursor:pointer;
  }

  footer{
    text-align:center;
    padding:20px;
    color:var(--muted);
    font-size:13px;
  }
</style>
</head>
<body>

<div class="wrap">
  <header>
    <div class="emoji">💡</div>
    <h1>Банк идей</h1>
    <p>Есть проблема на работе или идея, как сделать лучше? Расскажи — коротко, своими словами. Анонимно, без регистрации.</p>
  </header>

  <div class="card" id="formCard">
    <form id="ideaForm">
      <div class="field">
        <label for="ideaText">Твоя идея или проблема</label>
        <textarea id="ideaText" required placeholder="Например: каждую неделю вручную свожу один и тот же отчёт в экселе — уходит полдня..."></textarea>
      </div>
      <div class="field">
        <label for="ideaName">Имя или отдел <span class="hint">(необязательно)</span></label>
        <input type="text" id="ideaName" placeholder="Например: Айгуль, бухгалтерия" />
      </div>
      <button type="submit" class="primary" id="submitBtn">Отправить идею</button>
    </form>
  </div>

  <div class="card thanks" id="thanksCard" hidden>
    <div class="emoji">🎉</div>
    <h2>Спасибо! Идея сохранена</h2>
    <p>Руководитель обязательно её увидит.</p>
    <button id="againBtn">Поделиться ещё одной</button>
  </div>
</div>

<footer>Идеи попадают напрямую владельцу проекта</footer>

<script>
/* Хранилище — Google Форма (владелец видит ответы во вкладке "Ответы" своей формы) */
const GOOGLE_FORM_ACTION = "https://docs.google.com/forms/d/e/1FAIpQLSdJyzf7ysm9MiJ0THem1b0wkRw_zRlMHbVyp-om0w0TyFMeXw/formResponse";
const ENTRY_IDEA = "entry.469381877";
const ENTRY_NAME = "entry.1407858799";

const ideaForm = document.getElementById("ideaForm");
const formCard = document.getElementById("formCard");
const thanksCard = document.getElementById("thanksCard");
const submitBtn = document.getElementById("submitBtn");

ideaForm.addEventListener("submit", async (e) => {
  e.preventDefault();
  const text = document.getElementById("ideaText").value.trim();
  const name = document.getElementById("ideaName").value.trim();
  if (!text) return;

  submitBtn.disabled = true;
  submitBtn.textContent = "Отправляем…";
  try {
    const fd = new FormData();
    fd.append(ENTRY_IDEA, text);
    fd.append(ENTRY_NAME, name);
    await fetch(GOOGLE_FORM_ACTION, { method: "POST", mode: "no-cors", body: fd });
    formCard.hidden = true;
    thanksCard.hidden = false;
    ideaForm.reset();
  } catch (err) {
    alert("Не получилось отправить, попробуй ещё раз");
  } finally {
    submitBtn.disabled = false;
    submitBtn.textContent = "Отправить идею";
  }
});

document.getElementById("againBtn").addEventListener("click", () => {
  thanksCard.hidden = true;
  formCard.hidden = false;
});
</script>
</body>
</html>
